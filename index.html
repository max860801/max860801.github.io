<style>
        /* 基礎設定 */
        body {
        margin: 0;
        padding: 0;
        background-color: #FFFFFF;
        font-family: "Microsoft JhengHei", sans-serif;
        overflow-x: hidden; /* 確保不會出現左右捲軸 */
        }
	/* 第一屏：開始閱讀區塊 */
        .hero-section {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 妳也可以將背景色換成妳的海報圖：background: url('images/poster.jpg') center/cover; */
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)),
                url('images/poster.jpg') center/cover no-repeat;
            color: white;
            text-align: center;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.1);
        }

        .hero-section h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .hero-section p {
            font-size: 1.1rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .btn-start {
            padding: 18px 50px;
            background-color: white;
            color: #FFB7B2;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .btn-start:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            background-color: #fff9f9;
        }
	/* 漫畫圖片設定 */
        img {
        display: block;
        border: 0;
        /* 修改這裡：寬度設為 100%，並設定最大寬度為 800px */
        width: 100%; 
        max-width: 800px; 
        height: auto;
        }

        /* 表格置中 */
        table {
        margin: 0 auto;
        border-collapse: collapse;
        /* 修改這裡：寬度設為 100%，並限制最大寬度 */
        width: 100%;
        max-width: 800px;
    }
</style>
